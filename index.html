    <title>Python Minifier</title>

    <meta property="og:type" content="Python Minifier" />
    <meta property="og:description" content="Python minifier is a tool that reduces the size of Python code by removing unnecessary characters, such as white spaces, comments, and line breaks. This can help to reduce the size of Python scripts and make them load faster, especially in web applications."/>

<body>
    <div class="container"></div>
    <section>
        <h1><svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="currentColor" viewBox="0 0 16 16"> <path d="M5.854 4.854a.5.5 0 1 0-.708-.708l-3.5 3.5a.5.5 0 0 0 0 .708l3.5 3.5a.5.5 0 0 0 .708-.708L2.707 8l3.147-3.146zm4.292 0a.5.5 0 0 1 .708-.708l3.5 3.5a.5.5 0 0 1 0 .708l-3.5 3.5a.5.5 0 0 1-.708-.708L13.293 8l-3.147-3.146z"/> </svg> Python Minifier <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="currentColor" viewBox="0 0 16 16"> <path d="M10.478 1.647a.5.5 0 1 0-.956-.294l-4 13a.5.5 0 0 0 .956.294l4-13zM4.854 4.146a.5.5 0 0 1 0 .708L1.707 8l3.147 3.146a.5.5 0 0 1-.708.708l-3.5-3.5a.5.5 0 0 1 0-.708l3.5-3.5a.5.5 0 0 1 .708 0zm6.292 0a.5.5 0 0 0 0 .708L14.293 8l-3.147 3.146a.5.5 0 0 0 .708.708l3.5-3.5a.5.5 0 0 0 0-.708l-3.5-3.5a.5.5 0 0 0-.708 0z"/> </svg></h1>
        <div>
            <header>
                <h1> </h1>
                <button id="mode"></button>
                <h2 class="text-bg-primary p-3">Original Source</h2>
                <p> </p>
                <h4><span class="badge text-bg-secondary" id="source-size" class="size"></span></h4>
            </header>
            <p> </p><textarea class="input-group mb-3 form-control" id="source" autocomplete="off" spellcheck="false" placeholder="Paste the code here.."></textarea>
            <div class="card">
                <fieldset class="">
                    <legend class="badge rounded-pill text-bg-info">Options</legend>
                    <div class="card-body">
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="combine_imports" checked="" /><label class="form-check-label" for="combine_imports">Combine Import statements</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="remove_pass" checked="" /><label class="form-check-label" for="remove_pass">Remove Pass statements</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="remove_literal_statements" checked="" /><label class="form-check-label" for="remove_literal_statements">Remove literal statements (docstrings)</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="remove_annotations" checked="" /><label for="remove_annotations">Remove Annotations</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="hoist_literals" name="Hoist Literals" checked="" /><label for="hoist_literals">Hoist Literals</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="rename_locals" name="Rename Locals" checked="" /><label for="rename_locals">Rename Locals</label></div>
                        <div><label class="form-label" for="preserve_locals">Preserved Locals:</label><input placeholder="Enter.." type="text" class="form-control" id="preserve_locals" name="Preserved Locals" checked="" /></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="rename_globals" name="Rename Globals" checked="" /><label for="rename_globals">Rename Globals</label></div>
                        <div><label class="form-label" for="preserve_globals">Preserved Globals:</label><input type="text" class="form-control" id="preserve_globals" name="Preserved Globals" checked="" value="handler" /></div>
                        <div class="input-check"><input class="form-check-input" type="checkbox" id="convert_posargs_to_args" name="Convert Positional-Only Arguments to Normal Arguments" checked="" /><label for="convert_posargs_to_args">Convert Positional-Only Arguments to Normal Arguments</label></div>
                    </div>
                </fieldset>
            </div>
            <div id="options">
                <h1><button class="btn btn-success" id="minify">Run <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M10.804 8 5 4.633v6.734L10.804 8zm.792-.696a.802.802 0 0 1 0 1.392l-6.363 3.692C4.713 12.69 4 12.345 4 11.692V4.308c0-.653.713-.998 1.233-.696l6.363 3.692z"/>
                      </svg></button></h1>
            </div>
            <header>
                <p> </p>
                <h2 class="text-bg-danger p-3">Minified Source</h2>
                <p> </p>
                <h4><span class="badge text-bg-secondary" id="minified-size" class="size"> Bytes</span></h4>
            </header>
            <p> </p><textarea class="input-group mb-3 form-control" id="minified" readonly="" autocomplete="off" spellcheck="false"></textarea><button class="btn btn-primary" id="copy">Copy <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/>
                    <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/>
                  </svg></button> </section>
    <p> </p>

    </footer>
